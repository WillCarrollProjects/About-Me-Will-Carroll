<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Will Carroll — About Me</title>
    <meta name="description" content="The personal About Me page of Will Carroll — a hiker, skier, and basketball fan from Houston, Texas. Say hello and check out a few of my favorite places.">
    <!-- Pull in the shared styles used by every page on the site -->
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <!-- Shared navigation — keep this IDENTICAL on every page -->
    <nav>
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html">Contact</a>
      <a href="about.html">About</a>
    </nav>

    <!-- Top-left fixed stack: songs button, then the Pokémon button under it -->
    <div style="position: fixed; top: 20px; left: 20px; z-index: 1000; text-align: left;">
      <!-- Big button linking to the songs chart -->
      <div><a href="charts.html" id="songs-button" style="display: inline-block; background-color: navy; color: white; font-size: 18px; font-weight: 600; padding: 16px 24px; border-radius: 10px; text-decoration: none; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);">🎵 Top 10 Most Played Songs</a></div>

      <!-- Pokémon button — now links to the dedicated Pokémon page -->
      <div><a href="pokemon.html" id="pokemon-button" style="display: inline-block; background-color: navy; color: white; font-weight: 600; padding: 12px 20px; font-size: 16px; border: none; border-radius: 10px; text-decoration: none;">Pokémon</a></div>
    </div>

    <!-- Top-right fixed stack: color + fact buttons, then the click counter below -->
    <div style="position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; gap: 15px;">
      <button id="color-button" class="white-btn">Change colors to hotpink</button>
      <button id="fact-button" class="white-btn">Tell me a fact!</button>
      <button id="counter-button" class="red-circle">0</button>
    </div>

    <h1 id="main-heading" style="color: navy;">Will Carroll</h1>
    <img id="profile-photo" src="profile.jpg" alt="Photo of Will Carroll" style="width: 300px; height: 400px; object-fit: cover; border-radius: 20px;">
    <p>I love <a href="movies.html">movies</a>.</p>
    <p>I love to ski.</p>
    <p>I love basketball.</p>
    <h2>Find me here:</h2>
    <div><a href="https://stonecoclimbing.com/">Stone Co Climbing</a></div>
    <div><a href="https://www.bryanlegends.com/">Legends Arena</a></div>

    <p id="fact-display"></p>

    <p id="big-number" style="font-size: 150px; margin: 0;"></p>

    <script>
      // --- Color theme toggle (flips ALL hotpink coloring to navy and back) ---

      // The current accent color used across the page. It lives OUTSIDE the
      // click function so it persists between clicks — and so the Pokémon
      // feature below can read it too.
      let themeColor = "navy";

      // 1. Find the heading and the color button on the page:
      const heading = document.querySelector("#main-heading");
      const colorButton = document.querySelector("#color-button");

      // Apply the current themeColor to every accent element at once:
      function applyThemeColor() {
        heading.style.color = themeColor;                                             // the big name heading
        document.querySelector("#songs-button").style.backgroundColor = themeColor;    // songs button
        document.querySelector("#pokemon-button").style.backgroundColor = themeColor;  // Pokémon button
        // If a Pokémon result heading is currently on screen, recolor it too:
        const resultHeading = document.querySelector("#pokemon-result h2");
        if (resultHeading) resultHeading.style.color = themeColor;
      }

      // 2. When clicked, flip to the other color and re-apply it everywhere:
      colorButton.addEventListener("click", function () {
        themeColor = themeColor === "hotpink" ? "navy" : "hotpink";
        applyThemeColor();

        // Update the label to offer the OTHER color next time:
        colorButton.textContent =
          themeColor === "hotpink" ? "Change colors to navy" : "Change colors to hotpink";

        console.log("Theme color is now: " + themeColor);
      });

      // --- Fun fact feature ---

      // 3. An array: a numbered list holding all 5 facts.
      const facts = [
        "My favorite basketball player is Nikola Jokic.",
        "I was born in Houston, Texas.",
        "I have 2 dogs.",
        "My favorite season is winter.",
        "My favorite seasonal food is pumpkin pie.",
      ];

      // 4. Find the fact button and the spot where the fact will show:
      const factButton = document.querySelector("#fact-button");
      const factDisplay = document.querySelector("#fact-display");
      const profilePhoto = document.querySelector("#profile-photo");

      // A special rare fact with only a 1-in-20 chance of appearing:
      const rareFact = "Jack is a chud";

      // Remember the last fact shown so we never repeat it twice in a row.
      // It lives OUTSIDE the click function so it survives between clicks.
      let lastIndex = -1;

      // 5. When clicked, usually show a random normal fact —
      //    but 1 time in 20, show the rare fact AND swap the photo:
      factButton.addEventListener("click", function () {
        if (Math.random() < 1 / 20) {
          // ~5% of the time: the rare fact + Jack's photo
          factDisplay.textContent = rareFact;
          profilePhoto.src = "jack.png";
          profilePhoto.alt = "Photo of Jack";
        } else {
          // Pick a random fact, but if it matches the last one,
          // keep rolling until we get a different one:
          let randomIndex = Math.floor(Math.random() * facts.length);
          while (randomIndex === lastIndex) {
            randomIndex = Math.floor(Math.random() * facts.length);
          }
          lastIndex = randomIndex; // remember it for next time

          factDisplay.textContent = facts[randomIndex];
          profilePhoto.src = "profile.jpg";
          profilePhoto.alt = "Photo of Will Carroll";
        }
      });

      // --- Click counter ---

      // This variable lives OUTSIDE the click function, so it survives between clicks.
      let count = 0;

      const counterButton = document.querySelector("#counter-button");
      const bigNumber = document.querySelector("#big-number");

      counterButton.addEventListener("click", function () {
        count = count + 1;
        counterButton.textContent = count;

        // Show a big 67 ONLY when the count is exactly 67; otherwise keep it empty:
        if (count === 67) {
          bigNumber.textContent = "67";
        } else {
          bigNumber.textContent = "";
        }
      });

      // The "My Favorite Pokémon" button now links to pokemon.html,
      // so no inline fetch is needed on this page anymore.
    </script>
  </body>
</html>
