<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Movies — Will Carroll</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="theme.js"></script>
    <!-- Chart.js draws the charts; PapaParse reads the CSV file -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  </head>
  <body>
    <!-- Shared navigation — keep this IDENTICAL on every page -->
    <nav>
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html">Contact</a>
      <a href="about.html">About</a>
    </nav>

    <main>
      <h1>How I Rate Movies</h1>

      <!-- Intro line with the decade dropdown pinned to the left -->
      <div style="position: relative; max-width: 1000px; margin: 0 auto;">
        <select id="decade-select" style="position: absolute; right: -40px; top: 0; padding: 8px 12px; font-size: 1rem; border-radius: 8px; border: 2px solid #00b020; cursor: pointer;">
          <option value="all">All Time</option>
        </select>
        <p>The star ratings I've given every film on my Letterboxd. <strong>Click a bar</strong> to see which films got that rating.</p>
      </div>

      <!-- The bar chart fills this box, so the box controls the size -->
      <div style="max-width: 1000px; height: 500px; margin: 0 auto;">
        <canvas id="ratingsChart"></canvas>
      </div>

      <p id="movies-status"></p>

      <!-- Two columns under the chart: clicked-bar film list on the LEFT, pie chart on the RIGHT -->
      <div style="display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-start; gap: 40px; max-width: 1000px; margin: 30px auto;">
        <div id="movie-list" style="flex: 1; min-width: 280px; text-align: left;"></div>
        <div style="flex: 1; min-width: 280px; height: 360px;">
          <canvas id="ratingsPie"></canvas>
        </div>
      </div>
    </main>

    <script>
      // Match Chart.js text + gridlines to the active theme (light or dark).
      var _light = document.documentElement.classList.contains("light-theme");
      Chart.defaults.color = _light ? "#333333" : "#ffffff";
      Chart.defaults.borderColor = _light ? "rgba(0,0,0,0.1)" : "rgba(255,255,255,0.15)";

      // Turn a rating number into stars, e.g. 3.5 -> "★★★½", 0.5 -> "½"
      function ratingLabel(r) {
        const full = Math.floor(r);
        const half = r % 1 !== 0;
        return "★".repeat(full) + (half ? "½" : "");
      }

      // Make text safe to drop into HTML (in case a title has < & > characters).
      function escapeHtml(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      // Which decade a year belongs to: 1994 -> 1990.
      function decadeOf(year) {
        return Math.floor(year / 10) * 10;
      }

      // Every possible Letterboxd rating, half a star at a time.
      const RATING_VALUES = [0.5, 1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5];
      // A diverging color scale: 1★ darkest red → yellow in the middle → 5★ darkest green.
      const RATING_COLORS = ["#b71c1c","#b71c1c","#e53935","#fb8c00","#fdd835","#cddc39","#9ccc65","#66bb6a","#388e3c","#1b5e20"];

      const status = document.querySelector("#movies-status");
      const movieList = document.querySelector("#movie-list");
      const decadeSelect = document.querySelector("#decade-select");

      let allFilms = [];          // every film: { title, year, rating }
      let currentMovies = {};     // rating -> [titles] for the CURRENT decade filter
      let barChart, pieChart;

      // Show the films for one rating in the list area (left column).
      function showMovies(rating) {
        const films = (currentMovies[rating] || []).slice().sort();
        if (films.length === 0) {
          movieList.innerHTML = "<p>No films rated " + ratingLabel(rating) + ".</p>";
          return;
        }
        let html = "<h2>" + ratingLabel(rating) + " — " + films.length +
          " film" + (films.length === 1 ? "" : "s") + "</h2><ul>";
        films.forEach(function (f) { html += "<li>" + escapeHtml(f) + "</li>"; });
        html += "</ul>";
        movieList.innerHTML = html;
      }

      // Recompute the charts for a given decade ("all" or a number like 1990).
      function render(decade) {
        const films = (decade === "all")
          ? allFilms
          : allFilms.filter(function (f) { return decadeOf(f.year) === decade; });

        // Count films per rating AND remember titles per rating (for the click list).
        const counts = {};
        currentMovies = {};
        films.forEach(function (f) {
          counts[f.rating] = (counts[f.rating] || 0) + 1;
          if (!currentMovies[f.rating]) currentMovies[f.rating] = [];
          currentMovies[f.rating].push(f.title);
        });

        // Update the BAR chart, with ~20% headroom above the tallest bar.
        const barData = RATING_VALUES.map(function (v) { return counts[v] || 0; });
        barChart.data.datasets[0].data = barData;
        const peak = Math.max.apply(null, barData);
        barChart.options.scales.y.suggestedMax = Math.ceil((peak || 1) * 1.2);
        barChart.update();

        // Update the PIE chart (skip ratings with zero films so it stays clean).
        const pieLabels = [], pieData = [], pieColors = [];
        RATING_VALUES.forEach(function (v, i) {
          const c = counts[v] || 0;
          if (c > 0) { pieLabels.push(ratingLabel(v)); pieData.push(c); pieColors.push(RATING_COLORS[i]); }
        });
        pieChart.data.labels = pieLabels;
        pieChart.data.datasets[0].data = pieData;
        pieChart.data.datasets[0].backgroundColor = pieColors;
        pieChart.update();

        // The old film list is stale for the new decade — clear it.
        movieList.innerHTML = "";

        const label = decade === "all" ? "all time" : decade + "s";
        status.textContent = "Based on " + films.length + " rated films (" + label + ").";
      }

      // 1. Load the ratings CSV exported from Letterboxd (every film I've rated).
      //    The "?t=" + Date.now() tag forces a fresh download each time, so an
      //    updated ratings.csv always shows up (no stale browser cache).
      fetch("ratings.csv?t=" + Date.now())
        .then(function (response) {
          if (!response.ok) throw new Error("Couldn't load ratings.csv (status " + response.status + ")");
          return response.text();
        })
        .then(function (csvText) {
          // 2. Parse the CSV into rows, then into our allFilms list.
          const rows = Papa.parse(csvText, { header: true, skipEmptyLines: true }).data;
          rows.forEach(function (row) {
            const rating = Number(row["Rating"]);
            const year = Number(row["Year"]);
            if (!row["Rating"] || isNaN(rating)) return;
            allFilms.push({
              title: row["Name"] + (row["Year"] ? " (" + row["Year"] + ")" : ""),
              year: year,
              rating: rating
            });
          });

          // 3. Fill the dropdown with the decades that actually appear in the data.
          const decades = [];
          allFilms.forEach(function (f) {
            if (!isNaN(f.year)) {
              const dec = decadeOf(f.year);
              if (decades.indexOf(dec) === -1) decades.push(dec);
            }
          });
          decades.sort(function (a, b) { return a - b; });
          decades.forEach(function (dec) {
            const opt = document.createElement("option");
            opt.value = String(dec);
            opt.textContent = dec + "s";
            decadeSelect.appendChild(opt);
          });

          // 4. Create the two charts ONCE (render() will fill in their data).
          barChart = new Chart(document.querySelector("#ratingsChart"), {
            type: "bar",
            data: {
              labels: RATING_VALUES.map(ratingLabel),
              datasets: [{ label: "Number of films", data: [], backgroundColor: "#00b020" }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: { y: { beginAtZero: true, ticks: { precision: 0 } } },
              onClick: function (evt, elements) {
                if (elements.length > 0) showMovies(RATING_VALUES[elements[0].index]);
              },
              onHover: function (evt, elements) {
                evt.native.target.style.cursor = elements.length ? "pointer" : "default";
              }
            }
          });
          pieChart = new Chart(document.querySelector("#ratingsPie"), {
            type: "pie",
            data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: "right" } } }
          });

          // 5. When the dropdown changes, re-render for that decade.
          decadeSelect.addEventListener("change", function () {
            render(this.value === "all" ? "all" : Number(this.value));
          });

          // 6. First render: All Time.
          render("all");
        })
        .catch(function (err) {
          status.textContent = "😅 Couldn't load the movie data. Make sure ratings.csv is in place.";
          console.error("Movies dashboard error:", err);
        });
    </script>
  </body>
</html>
